apiVersion: redhatcop.redhat.io/v1alpha1
kind: GroupConfig
metadata:
  name: cluster-developer-groupconfig-rbac
  labels:
    app.kubernetes.io/name: namespace-configuration-operator
    app.kubernetes.io/component: cluster-rbac-automation
    rbac.ocp.io/scope: cluster-wide
    rbac.ocp.io/kind: GroupConfig
  annotations:
    description: "Cluster RBAC: edit ClusterRole for cluster-developer groups"
spec:
  labelSelector:
    matchExpressions:
    - key: group-sync-operator.redhat-cop.io/sync-provider
      operator: Exists  # Only match synced groups
  templates:
    # ClusterRoleBinding for cluster-level groups only
    - objectTemplate: |
        {{- if hasSuffix "-cluster-developer" .Name }}
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: "{{ .Name }}-crb"
          labels:
            app.kubernetes.io/managed-by: namespace-configuration-operator
            app.kubernetes.io/version: 0.1.0
            rbac.ocp.io/policy-version: 0.1.0
            rbac.ocp.io/role-type: cluster-developer
            rbac.ocp.io/group-name: "{{ .Name }}"
            rbac.ocp.io/access-level: edit-cluster-wide
            rbac.ocp.io/config-source: cluster-rbac
          annotations:
            rbac.ocp.io/created-by: namespace-configuration-operator
            rbac.ocp.io/source-groupconfig: cluster-developer-groupconfig-rbac
            rbac.ocp.io/group-pattern: "app-ocp-rbac-*-cluster-developer"
            rbac.ocp.io/scope-restriction: "cluster-wide"
        subjects:
        - kind: Group
          name: "{{ .Name }}"
          apiGroup: rbac.authorization.k8s.io
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: edit
        {{- end }}
